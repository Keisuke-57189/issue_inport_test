
name: Import Azure DevOps Issues

on:
  workflow_dispatch:
    inputs:
      file_path:
        description: 'CSV file path'
        required: true
        default: 'data/add-issues.csv'

permissions:
  contents: read
  issues: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import Issues
        uses: dsanchezcr/issue-importer-action@v1.0.0
        with:
          file-path: data/add-issues.csv
          file-format: csv
          github-token: ${{ secrets.GITHUB_TOKEN }}
